<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPI Warrior Dashboard</title>

  <style>
    :root {
      --teal: #0f9f9a;
      --cyan: #0ea5e9;
      --green: #58c76b;
      --lime: #98c93c;
      --orange: #ff7a1a;
      --dark: #172033;
      --muted: #66738a;
      --line: #c9e8f1;
      --card: rgba(255, 255, 255, 0.82);
      --shadow: 0 10px 28px rgba(30, 79, 110, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(40, 201, 214, 0.22), transparent 35%),
        radial-gradient(circle at top right, rgba(104, 210, 93, 0.2), transparent 35%),
        linear-gradient(135deg, #edf9ff 0%, #f7fffb 45%, #f4f8ff 100%);
      color: var(--dark);
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
    }

    .topbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 54px;
      padding: 7px 12px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(241, 253, 255, 0.88)),
        linear-gradient(90deg, rgba(14, 165, 233, 0.13), rgba(88, 199, 107, 0.13));
      border: 1px solid rgba(168, 221, 235, 0.95);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      z-index: 5;
      overflow: hidden;
    }

    .topbar::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(15, 159, 154, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 159, 154, 0.045) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .brand {
      position: relative;
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 220px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--cyan), var(--teal) 48%, var(--green));
      color: #fff;
      font-size: 18px;
      box-shadow: 0 8px 18px rgba(15, 159, 154, 0.22);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .eyebrow {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 1.35px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .page-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #0795b3 0%, #0fb983 48%, #88bd26 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space: nowrap;
    }

    .nav-zone {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      flex: 1;
      flex-wrap: wrap;
    }

    .tab-button,
    .select-screen,
    .reload-button {
      height: 34px;
      border-radius: 12px;
      border: 1px solid rgba(184, 205, 221, 0.95);
      background: rgba(255, 255, 255, 0.78);
      color: #2d3748;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.15px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      box-shadow: 0 3px 10px rgba(45, 68, 95, 0.055);
    }

    .tab-button {
      min-width: 108px;
      padding: 0 12px;
    }

    .tab-button:hover,
    .reload-button:hover,
    .select-screen:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 159, 154, 0.55);
      box-shadow: 0 8px 18px rgba(30, 79, 110, 0.1);
    }

    .tab-button.active {
      border: none;
      color: #ffffff;
      background: linear-gradient(135deg, #0894b3 0%, #12b886 50%, #72c247 100%);
      box-shadow: 0 8px 22px rgba(17, 173, 137, 0.28);
      position: relative;
      overflow: hidden;
    }

    .tab-button.active::after {
      content: "";
      position: absolute;
      top: -40%;
      left: -30%;
      width: 70%;
      height: 180%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      transform: rotate(18deg);
      animation: shine 2.8s linear infinite;
    }

    @keyframes shine {
      0% { left: -70%; }
      100% { left: 120%; }
    }

    .select-screen {
      min-width: 152px;
      padding: 0 34px 0 12px;
      outline: none;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #172033 50%),
        linear-gradient(135deg, #172033 50%, transparent 50%),
        linear-gradient(135deg, rgba(255,255,255,0.9), rgba(245,253,255,0.84));
      background-position:
        calc(100% - 18px) 15px,
        calc(100% - 13px) 15px,
        0 0;
      background-size:
        5px 5px,
        5px 5px,
        100% 100%;
      background-repeat: no-repeat;
    }

    .reload-button {
      width: 36px;
      display: grid;
      place-items: center;
      padding: 0;
      font-size: 16px;
    }

    /* Month selector */
    .month-divider {
      width: 1px;
      height: 22px;
      background: rgba(148, 163, 184, 0.35);
      margin: 0 2px;
    }

    .month-select-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .month-label {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .month-picker {
      height: 34px;
      border-radius: 12px;
      border: 1px solid rgba(184, 205, 221, 0.95);
      background: rgba(255, 255, 255, 0.78);
      color: #2d3748;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.15px;
      cursor: pointer;
      padding: 0 10px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      min-width: 160px;
    }

    .month-picker:hover {
      border-color: rgba(15, 159, 154, 0.55);
      box-shadow: 0 4px 12px rgba(30, 79, 110, 0.1);
    }

    .month-picker.history-active {
      border-color: rgba(14, 165, 233, 0.6);
      background: linear-gradient(135deg, rgba(240,249,255,0.95), rgba(255,255,255,0.9));
      color: #0369a1;
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.15);
    }

    @media (max-width: 768px) {
      .month-select-wrap { width: 100%; }
      .month-picker { flex: 1; }
      .month-divider { display: none; }
    }

    .frame-shell {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.96), rgba(238, 252, 255, 0.88)),
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(88, 199, 107, 0.12), transparent 30%);
      border: 1px solid rgba(177, 223, 235, 0.95);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .frame-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.38), rgba(88, 199, 107, 0.36), rgba(255, 122, 26, 0.18));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      pointer-events: none;
      z-index: 2;
    }

    .frame-grid {
      width: 100%;
      height: 100%;
      padding: 7px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .frame-grid.multi-view {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .frame-grid.stack-view {
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scroll-behavior: smooth;
      padding-right: 10px;
    }

    .frame-grid.stack-view .frame-panel {
      flex: 0 0 calc(100vh - 96px);
      min-height: 620px;
    }

    .frame-grid.stack-view::-webkit-scrollbar {
      width: 10px;
    }

    .frame-grid.stack-view::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(14, 165, 233, 0.42), rgba(88, 199, 107, 0.42));
      border: 2px solid rgba(255, 255, 255, 0.88);
    }

    .frame-panel {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 17px;
      background: #ffffff;
      border: 1px solid rgba(177, 223, 235, 0.85);
      box-shadow: 0 6px 18px rgba(30, 79, 110, 0.08);
    }

    .frame-panel.single-view .frame-label {
      display: none;
    }

    .frame-label {
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      font-size: 11px;
      font-weight: 900;
      color: #0f6678;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      background: linear-gradient(90deg, rgba(14, 165, 233, 0.1), rgba(88, 199, 107, 0.1));
      border-bottom: 1px solid rgba(177, 223, 235, 0.72);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    iframe {
      width: 100%;
      height: 100%;
      flex: 1;
      min-height: 0;
      border: none;
      display: block;
      background: #ffffff;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.92), rgba(239,252,255,0.86));
      backdrop-filter: blur(6px);
    }

    .loading.show {
      display: flex;
    }

    .loading-card {
      min-width: 240px;
      padding: 18px 22px;
      border-radius: 22px;
      text-align: center;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(178, 224, 235, 0.9);
      box-shadow: 0 14px 38px rgba(30, 79, 110, 0.14);
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 10px;
      border-radius: 50%;
      border: 4px solid rgba(14, 165, 233, 0.16);
      border-top-color: var(--teal);
      border-right-color: var(--green);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      font-weight: 900;
      color: var(--dark);
    }

    .mobile-label {
      display: none;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.1px;
      color: var(--muted);
      text-transform: uppercase;
    }

    @media (max-width: 1280px) {
      .tab-button {
        min-width: 96px;
        padding: 0 10px;
      }

      .brand {
        min-width: 195px;
      }
    }

    @media (max-width: 1100px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        min-height: auto;
      }

      .brand {
        width: 100%;
      }

      .nav-zone {
        width: 100%;
        justify-content: flex-start;
      }

      .frame-grid.multi-view {
        grid-template-columns: 1fr;
      }

      .frame-grid.stack-view .frame-panel {
        flex-basis: calc(100vh - 142px);
        min-height: 560px;
      }
    }

    @media (max-width: 768px) {
      .app {
        padding: 6px;
        gap: 6px;
      }

      .topbar {
        padding: 8px;
        border-radius: 18px;
      }

      .brand-icon {
        width: 32px;
        height: 32px;
        border-radius: 12px;
        font-size: 16px;
      }

      .page-title {
        font-size: 15px;
      }

      .eyebrow {
        font-size: 8px;
      }

      .mobile-label {
        display: block;
        width: 100%;
      }

      .tab-button {
        flex: 1 1 calc(50% - 7px);
        min-width: 0;
      }

      .select-screen {
        flex: 1 1 100%;
        width: 100%;
      }

      .frame-shell {
        border-radius: 18px;
      }

      .frame-grid {
        padding: 5px;
        gap: 5px;
      }

      .frame-grid.stack-view {
        padding-right: 6px;
      }

      .frame-grid.stack-view .frame-panel {
        flex-basis: calc(100vh - 158px);
        min-height: 520px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">⚡</div>
        <div class="brand-text">
          <div class="eyebrow">All-Star Race Dashboard</div>
          <h1 class="page-title" id="pageTitle">KPI Tổng</h1>
        </div>
      </div>

      <nav class="nav-zone" aria-label="Chuyển màn hình KPI">
        <div class="mobile-label">Chọn khu vực</div>

        <button class="tab-button active" data-key="total">KPI Tổng</button>
        <button class="tab-button" data-key="hcm">Hồ Chí Minh</button>
        <button class="tab-button" data-key="hn">Hà Nội</button>
        <button class="tab-button" data-key="dn">Đà Nẵng</button>
        <button class="tab-button" data-key="all3">Xem 3 miền</button>
        <button class="tab-button" data-key="all4">Xem tất cả</button>

        <select class="select-screen" id="screenSelect" aria-label="Chọn màn hình KPI">
          <option value="total">KPI Tổng</option>
          <option value="hcm">Hồ Chí Minh</option>
          <option value="hn">Hà Nội</option>
          <option value="dn">Đà Nẵng</option>
          <option value="all3">Xem 3 miền</option>
          <option value="all4">Xem tất cả</option>
        </select>

        <button class="reload-button" id="reloadButton" title="Tải lại màn hình">↻</button>

        <div class="month-divider"></div>
        <div class="month-select-wrap">
          <span class="month-label">📅 Tháng</span>
          <select class="month-picker" id="monthPicker" title="Chọn tháng để xem — tháng cũ sẽ cố định vào tất cả iframe">
            <option value="">⏱ Hiện tại</option>
          </select>
        </div>
      </nav>
    </header>

    <main class="frame-shell">
      <div class="loading" id="loading">
        <div class="loading-card">
          <div class="spinner"></div>
          <div class="loading-text">Đang tải bảng xếp hạng...</div>
        </div>
      </div>

      <div class="frame-grid" id="frameGrid"></div>
    </main>
  </div>

  <script>
    const STORAGE_KEY       = "warrior-dashboard-active-key";
    const STORAGE_MONTH_KEY = "warrior-dashboard-month";

    // Base GAS URL — dùng chung cho tất cả view
    const GAS_BASE = "https://script.google.com/macros/s/AKfycbwquxx8e7LDCGsEQZGvPIuE6Q_LAVW5b4BtZXIjUt34qnryJYKapvpbU9jXBzQupn3WhA/exec";

    const dashboards = {
      total: {
        title: "KPI Tổng",
        params: "view=kpi_total&type=warrior"
      },
      hcm: {
        title: "KPI Hồ Chí Minh",
        params: "view=kpi_hcm&type=warrior"
      },
      hn: {
        title: "KPI Hà Nội",
        params: "view=kpi_hn&type=warrior"
      },
      dn: {
        title: "KPI Đà Nẵng",
        params: "view=kpi_dn&type=warrior"
      },
      all3: {
        title: "KPI 3 Miền",
        frames: ["hcm", "hn", "dn"],
        layout: "grid"
      },
      all4: {
        title: "Xem tất cả",
        frames: ["total", "hcm", "hn", "dn"],
        layout: "stack"
      }
    };

    const frameGrid    = document.getElementById("frameGrid");
    const pageTitle    = document.getElementById("pageTitle");
    const screenSelect = document.getElementById("screenSelect");
    const loading      = document.getElementById("loading");
    const reloadButton = document.getElementById("reloadButton");
    const monthPicker  = document.getElementById("monthPicker");
    const buttons      = document.querySelectorAll(".tab-button");

    let currentKey   = "total";
    let pendingFrames = 0;
    let selectedMonth = ""; // "" = tháng hiện tại

    // ============================================================
    // Tính tháng hiện tại dạng "YYYY-MM"
    // ============================================================
    function getCurrentMonthKey() {
      const now = new Date();
      return now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
    }

    // ============================================================
    // Tạo URL đầy đủ cho từng iframe, tự động gắn &month= nếu cần
    // ============================================================
    function buildIframeUrl(frameKey, forceReload = false) {
      const dashboard = dashboards[frameKey];
      if (!dashboard || !dashboard.params) return "";
      let url = GAS_BASE + "?" + dashboard.params;
      // Chỉ gắn &month= khi đang xem tháng cũ (không gắn khi tháng hiện tại để tránh lock dropdown)
      if (selectedMonth && selectedMonth !== getCurrentMonthKey()) {
        url += "&month=" + selectedMonth;
      }
      if (forceReload) url += "&reload=" + Date.now();
      return url;
    }

    // ============================================================
    // Load danh sách tháng lịch sử từ GAS (gọi 1 lần khi load trang)
    // ============================================================
    function loadAvailableMonths() {
      // Gọi API GAS qua fetch để lấy danh sách tháng có snapshot
      // Dùng endpoint đặc biệt: thêm ?action=getMonths
      // GAS doGet sẽ trả về JSON nếu có action=getMonths
      fetch(GAS_BASE + "?action=getMonths")
        .then(r => r.json())
        .then(months => {
          if (!Array.isArray(months) || months.length === 0) return;
          const currentKey = getCurrentMonthKey();
          months.forEach(m => {
            if (m === currentKey) return; // tháng hiện tại đã có option mặc định
            const [y, mo] = m.split("-");
            const opt = document.createElement("option");
            opt.value = m;
            opt.textContent = `📜 Tháng ${mo}/${y}`;
            monthPicker.appendChild(opt);
          });
          // Restore tháng đã chọn từ localStorage
          const saved = localStorage.getItem(STORAGE_MONTH_KEY) || "";
          if (saved && saved !== currentKey) {
            monthPicker.value = saved;
            selectedMonth = saved;
            monthPicker.classList.add("history-active");
          }
        })
        .catch(() => {
          // Nếu không load được (CORS, lỗi mạng) → chỉ có option "Hiện tại", vẫn hoạt động
          console.log("Không load được danh sách tháng lịch sử — chỉ hiện tháng hiện tại");
        });
    }

    function setActiveButton(key) {
      buttons.forEach(button => {
        button.classList.toggle("active", button.dataset.key === key);
      });
    }

    function showLoading() { loading.classList.add("show"); }
    function hideLoading() { loading.classList.remove("show"); }

    function saveLastDashboard(key) { localStorage.setItem(STORAGE_KEY, key); }
    function getInitialDashboardKey() {
      const savedKey = localStorage.getItem(STORAGE_KEY);
      return dashboards[savedKey] ? savedKey : "total";
    }

    function createFramePanel(frameKey, forceReload = false) {
      const dashboard = dashboards[frameKey];
      const panel  = document.createElement("section");
      const label  = document.createElement("div");
      const iframe = document.createElement("iframe");

      panel.className = "frame-panel";
      label.className = "frame-label";
      label.textContent = dashboard.title;

      iframe.title = dashboard.title;
      iframe.src   = buildIframeUrl(frameKey, forceReload);
      iframe.addEventListener("load", () => {
        pendingFrames -= 1;
        if (pendingFrames <= 0) hideLoading();
      });

      panel.appendChild(label);
      panel.appendChild(iframe);
      return panel;
    }

    function renderFrames(key, forceReload = false) {
      const dashboard = dashboards[key];
      const frameKeys = dashboard.frames || [key];
      const layout    = dashboard.layout || (frameKeys.length > 1 ? "grid" : "single");

      pendingFrames  = frameKeys.length;
      frameGrid.innerHTML = "";
      frameGrid.classList.toggle("multi-view",  layout === "grid");
      frameGrid.classList.toggle("stack-view",  layout === "stack");

      frameKeys.forEach(frameKey => {
        const panel = createFramePanel(frameKey, forceReload);
        if (layout === "single") panel.classList.add("single-view");
        frameGrid.appendChild(panel);
      });
    }

    function changeDashboard(key, forceReload = false) {
      const dashboard = dashboards[key];
      if (!dashboard) return;

      currentKey = key;
      saveLastDashboard(key);

      if (dashboard.frames) { hideLoading(); } else { showLoading(); }

      pageTitle.textContent  = dashboard.title;
      document.title         = "Warrior Dashboard";
      screenSelect.value     = key;
      setActiveButton(key);
      renderFrames(key, forceReload);
    }

    // ============================================================
    // Đọc params từ URL hash — hỗ trợ:
    //   #month=2026-06
    //   #view=hcm
    //   #month=2026-06&view=hcm
    // Hash không cần server xử lý → hoạt động trên GitHub Pages
    // ============================================================
    function parseHash() {
      const hash = window.location.hash.replace(/^#/, "");
      if (!hash) return {};
      const params = {};
      hash.split("&").forEach(part => {
        const [k, v] = part.split("=");
        if (k && v) params[decodeURIComponent(k)] = decodeURIComponent(v);
      });
      return params;
    }

    function applyHashParams() {
      const params = parseHash();

      // ?month từ hash — ưu tiên cao nhất, override localStorage
      if (params.month) {
        selectedMonth = params.month;
        monthPicker.value = params.month;
        const isHistory = selectedMonth !== getCurrentMonthKey();
        monthPicker.classList.toggle("history-active", isHistory);
        // Không lưu vào localStorage khi từ hash (để tab khác không bị ảnh hưởng)
      }

      // ?view từ hash — override localStorage
      if (params.view && dashboards[params.view]) {
        return params.view; // trả về key để changeDashboard dùng
      }
      return null;
    }

    // ============================================================
    // Xử lý đổi tháng
    // ============================================================
    monthPicker.addEventListener("change", () => {
      selectedMonth = monthPicker.value;
      localStorage.setItem(STORAGE_MONTH_KEY, selectedMonth);
      const isHistory = selectedMonth && selectedMonth !== getCurrentMonthKey();
      monthPicker.classList.toggle("history-active", isHistory);
      // Cập nhật hash trên URL (không reload trang) để URL có thể share được
      const currentHash = parseHash();
      currentHash.month = selectedMonth || "";
      if (!currentHash.month) delete currentHash.month;
      const newHash = Object.entries(currentHash).map(([k,v]) => k+"="+v).join("&");
      history.replaceState(null, "", newHash ? "#" + newHash : window.location.pathname);
      changeDashboard(currentKey, false);
    });

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        const key = button.dataset.key;
        // Cập nhật hash view khi đổi tab
        const currentHash = parseHash();
        currentHash.view = key;
        const newHash = Object.entries(currentHash).map(([k,v]) => k+"="+v).join("&");
        history.replaceState(null, "", "#" + newHash);
        changeDashboard(key);
      });
    });

    screenSelect.addEventListener("change", event => {
      changeDashboard(event.target.value);
    });

    reloadButton.addEventListener("click", () => {
      changeDashboard(currentKey, true);
    });

    // ============================================================
    // Khởi động — ưu tiên hash > localStorage
    // ============================================================
    loadAvailableMonths();
    const hashViewKey = applyHashParams(); // đọc hash trước
    changeDashboard(hashViewKey || getInitialDashboardKey());
  </script>
</body>
</html>
